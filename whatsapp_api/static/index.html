<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local WhatsApp Sender</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7f6;
      color: #17201c;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
      background: #ffffff;
      border: 1px solid #dde7e2;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 12px 36px rgba(18, 37, 30, 0.08);
    }

    h1 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      border: 1px solid #b8c9c1;
      border-radius: 6px;
      padding: 11px 12px;
      font: inherit;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      background: #118c5b;
      color: #ffffff;
    }

    button.secondary {
      background: #24342e;
    }

    pre {
      margin: 18px 0 0;
      padding: 14px;
      min-height: 44px;
      white-space: pre-wrap;
      word-break: break-word;
      background: #eef5f2;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Local WhatsApp Sender</h1>

    <label for="apiKey">API Key</label>
    <input id="apiKey" type="password" placeholder="Use API_KEY from .env, for example zakwan123" autocomplete="off">

    <label for="number">Phone Number</label>
    <input id="number" type="text" placeholder="8801XXXXXXXXX">

    <label for="message">Message</label>
    <textarea id="message" placeholder="Hello"></textarea>

    <div class="actions">
      <button type="button" onclick="checkStatus()">Check Status</button>
      <button type="button" class="secondary" onclick="sendMessage()">Send Message</button>
    </div>

    <pre id="result">Result will appear here.</pre>
  </main>

  <script>
    const apiKeyInput = document.getElementById("apiKey");
    const result = document.getElementById("result");

    apiKeyInput.value = localStorage.getItem("whatsapp_api_key") || "";

    function headers() {
      const apiKey = apiKeyInput.value.trim();
      localStorage.setItem("whatsapp_api_key", apiKey);

      return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      };
    }

    async function showResponse(response) {
      const text = await response.text();

      try {
        result.textContent = JSON.stringify(JSON.parse(text), null, 2);
      } catch {
        result.textContent = `${response.status} ${response.statusText}\n${text}`;
      }
    }

    async function checkStatus() {
      try {
        result.textContent = "Checking...";

        const response = await fetch("/status", {
          method: "GET",
          headers: headers()
        });

        await showResponse(response);
      } catch (error) {
        result.textContent = `Request failed: ${error.message}`;
      }
    }

    async function sendMessage() {
      try {
        result.textContent = "Sending...";

        const response = await fetch("/send-message", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({
            number: document.getElementById("number").value.trim(),
            message: document.getElementById("message").value
          })
        });

        await showResponse(response);
      } catch (error) {
        result.textContent = `Request failed: ${error.message}`;
      }
    }
  </script>
</body>
</html>
